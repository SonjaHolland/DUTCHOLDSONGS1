<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE AID TV 1985</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at center,#303030,#000);
    font-family:Arial,Helvetica,sans-serif;
}

/* TV KAST */
#tv{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:97vw;
    height:97vh;
    padding:35px;
    border-radius:18px;
    background:linear-gradient(145deg,#a4a4a4 0%,#5d5d5d 12%,#dadada 24%,#5d5d5d 38%,#2f2f2f 55%,#8d8d8d 70%,#202020 100%);
    box-shadow: inset 0 0 25px rgba(255,255,255,.35), inset 0 0 80px rgba(0,0,0,.7), 0 0 80px black;
}

/* SCHERM */
#screen{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    border-radius:12px;
    background:black;
    box-shadow: inset 0 0 60px rgba(255,255,255,.08), inset 0 0 200px black;
}

/* lichte bolling */
#screen:before{
    content:"";
    position:absolute;
    left:-3%;
    top:-3%;
    width:106%;
    height:106%;
    background: radial-gradient(circle,transparent 60%,rgba(255,255,255,.10));
    pointer-events:none;
    z-index:20;
}

/* scanlines */
#screen:after{
    content:"";
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(to bottom,rgba(255,255,255,.02) 0px,rgba(255,255,255,.02) 2px,transparent 3px,transparent 5px);
    pointer-events:none;
    z-index:15;
}

/* VIDEO */
iframe{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    border:none;
    z-index:1;
}

/* COVER */
#cover{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    transition:1.2s;
    z-index:10;
}

#cover img{
    width:58%;
    max-width:700px;
    border-radius:12px;
    box-shadow:0 0 50px black,0 0 25px rgba(255,255,255,.15);
}

/* BOVENBALK */
#topbar{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    z-index:30;
    color:white;
    font-size:28px;
    font-weight:bold;
    letter-spacing:3px;
    text-shadow:0 0 5px rgba(120,60,60,.4);
}

#live{
    color:#E35335;
    text-shadow:none;
}

/* LED */
#led{
    position:absolute;
    right:35px;
    bottom:20px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:red;
    box-shadow:0 0 10px red,0 0 25px red,0 0 40px red;
    z-index:40;
}

/* KNOPPEN */
#controls{
    position:absolute;
    bottom:45px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    z-index:35;
    transition:.4s;
}

button{
    padding:6px 18px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    border:none;
    border-radius:6px;
    background:#6a6a6a;
    box-shadow:0 2px 0 #444,0 4px 10px rgba(0,0,0,.45);
    transition:.2s;
}
