<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE AID TV 1985</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at center,#303030,#000);
    font-family:Arial,Helvetica,sans-serif;
}

/* TV KAST */
#tv{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:97vw;
    height:97vh;
    padding:35px;
    border-radius:18px;
    background:linear-gradient(145deg,#a4a4a4 0%,#5d5d5d 12%,#dadada 24%,#5d5d5d 38%,#2f2f2f 55%,#8d8d8d 70%,#202020 100%);
    box-shadow: inset 0 0 25px rgba(255,255,255,.35), inset 0 0 80px rgba(0,0,0,.7), 0 0 80px black;
}

/* SCHERM */
#screen{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    border-radius:12px;
    background:black;
    box-shadow: inset 0 0 60px rgba(255,255,255,.08), inset 0 0 200px black;
}

/* VIDEO */
#player{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* EXIT-LAAG */
#exitLayer{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:5;
    pointer-events:none;
}

.fullscreen-active #exitLayer{
    pointer-events:auto;
    cursor:pointer;
}

/* COVER */
#cover{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    transition:1.2s;
    z-index:10;
}

#cover img{
    width:58%;
    max-width:700px;
    border-radius:12px;
    box-shadow:0 0 50px black,0 0 25px rgba(255,255,255,.15);
}

/* BOVENBALK */
#topbar{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:60px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
    z-index:30;
    color:white;
    font-size:28px;
    font-weight:bold;
    letter-spacing:3px;
}

#live{
    color:#E35335;
}

/* LED */
#led{
    position:absolute;
    right:35px;
    bottom:20px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:red;
    box-shadow:0 0 10px red,0 0 25px red,0 0 40px red;
    z-index:40;
}

/* KNOPPEN */
#controls{
    position:absolute;
    bottom:45px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:20px;
    z-index:35;
    transition:.3s;
}

button{
    padding:6px 18px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    border:none;
    border-radius:6px;
    background:#6a6a6a;
    box-shadow:0 2px 0 #444,0 4px 10px rgba(0,0,0,.45);
    transition:.2s;
}

/* INFO */
#info{
    position:absolute;
    left:25px;
    bottom:25px;
    color:#00ff99;
    font-size:22px;
    font-family:Courier New;
    z-index:35;
}

/* VERBERG */
.hidden{
    opacity:0;
    pointer-events:none;
}

</style>

</head>

<body>

<div id="tv">

    <div id="screen">

        <div id="topbar">
            <div><span id="live">OLD DUTCH SONGS</span></div>
            <div id="counter">1 / 16</div>
        </div>

        <div id="cover">
            <img src="OLD100.jpg" alt="OLD100">
        </div>

        <div id="player"></div>

        <div id="exitLayer"></div>

        <div id="info">Wim Sonneveld - Tearoom tango</div>

        <div id="controls">
            <button id="playBtn">PLAY</button>
            <button id="nextBtn">NEXT ▶</button>
        </div>

        <div id="led"></div>

    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;
let playing=false;
let fullscreen=false;

const playlist=[
{id:"ux55xgGqwHk",title:"Tearoom tango"},
{id:"GiF8YZi3OPg",title:"Zij Kon Het Lonken Niet Laten"},
{id:"CTrzuKEimA8",title:"Het Dorp"},
{id:"QjpELXud588",title:"Gerrit"},
{id:"-ZWd3BF8T2U",title:"Margootje"},
{id:"hf6-cP_1JwE",title:"omdat ik zoveel van je hou"},
{id:"NCkbjNgPX5g",title:"In een Rijtuigie"},
{id:"TWs3wmYwxEA",title:"Op een mooie pinksterdag"},
{id:"XRcyGdDrnbQ",title:"De kat van ome Willem"},
{id:"U_ARWZPkGts",title:"Bloody Mary"},
{id:"bxwxPZ18vy4",title:"Een reisje langs de Rijn"},
{id:"h7pIIvitprY",title:"naar de kermis"},
{id:"tlonKiAKcEw",title:"Droomland"},
{id:"14o8vL5OJk0",title:"Laat Me"},
{id:"n-gb5XN1Z3c",title:"Pastorale"},
{id:"2OKMSTwyOzs",title:"Twee Motten"}
];

let current=0;

function updateInfo(){
    document.getElementById("info").innerHTML = playlist[current].title;
    document.getElementById("counter").innerHTML = (current+1)+" / "+playlist.length;
}

function onYouTubeIframeAPIReady(){
    player=new YT.Player("player",{
        height:"100%",
        width:"100%",
        videoId:playlist[current].id,
        playerVars:{autoplay:0,controls:0,rel:0,modestbranding:1,fs:0},
        events:{
            'onReady':function(){ updateInfo(); },
            'onStateChange':onPlayerStateChange
        }
    });
}

function onPlayerStateChange(e){
    if(e.data==YT.PlayerState.ENDED){
        nextVideo();
    }
}

function nextVideo(){
    current++;
    if(current>=playlist.length){ current=0; }
    player.loadVideoById(playlist[current].id);
    updateInfo();
    player.playVideo();
    playing=true;

    /* ⭐ FULLSCREEN FIX: fullscreen blijft actief */
    if(fullscreen){
        enterFullscreen();
    }
}

/* Fullscreen aan */
function enterFullscreen(){
    document.getElementById("screen").classList.add("fullscreen-active");

    document.getElementById("topbar").classList.add("hidden");
    document.getElementById("info").classList.add("hidden");
    document.getElementById("controls").classList.add("hidden");
    document.getElementById("cover").classList.add("hidden");
    document.getElementById("led").classList.add("hidden");
}

/* Fullscreen uit */
function exitFullscreen(){
    document.getElementById("screen").classList.remove("fullscreen-active");

    document.getElementById("topbar").classList.remove("hidden");
    document.getElementById("info").classList.remove("hidden");
    document.getElementById("controls").classList.remove("hidden");
    document.getElementById("cover").classList.remove("hidden");
    document.getElementById("led").classList.remove("hidden");
}

document.getElementById("playBtn").onclick=function(event){

    event.stopPropagation();

    if(!playing){

        document.getElementById("cover").style.opacity="0";
        setTimeout(()=>{ document.getElementById("cover").style.display="none"; },1200);

        player.playVideo();
        playing=true;
        this.innerHTML="PAUSE";

        enterFullscreen();
        fullscreen=true;

    } else {

        player.pauseVideo();
        playing=false;
        this.innerHTML="PLAY";

        exitFullscreen();
        fullscreen=false;
    }
};

document.getElementById("nextBtn").onclick=function(event){
    event.stopPropagation();
    nextVideo();
};

/* Klik op exitLayer → fullscreen uit */
document.getElementById("exitLayer").onclick=function(){
    if(fullscreen){
        exitFullscreen();
        fullscreen=false;
    }
};

</script>

</body>
</html>
