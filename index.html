<!DOCTYPE html>
<html lang="nl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIVE AID TV 1985</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at center,#303030,#000);
    font-family:Arial,Helvetica,sans-serif;
}

/* TV KAST */
#tv{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:97vw;
    height:97vh;
    padding:35px;
    border-radius:18px;
    background:linear-gradient(145deg,#a4a4a4 0%,#5d5d5d 12%,#dadada 24%,#5d5d5d 38%,#2f2f2f 55%,#8d8d8d 70%,#202020 100%);
    box-shadow: inset 0 0 25px rgba(255,255,255,.35), inset 0 0 80px rgba(0,0,0,.7), 0 0 80px black;
}

/* SCHERM */
#screen{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    border-radius:12px;
    background:black;
    box-shadow: inset 0 0 60px rgba(255,255,255,.08), inset 0 0 200px black;
}

/* VIDEO */
#player{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* EXIT-LAAG */
#exitLayer{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    z-index:5;
    pointer-events:none;
}

.fullscreen-active #exitLayer{
    pointer-events:auto;
    cursor:pointer;
}

/* COVER */
#cover{
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    display:flex;
